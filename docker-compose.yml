services:
  chroma:
    image: chromadb/chroma:0.5.23
    restart: unless-stopped
    volumes:
      - ./chroma_data:/chroma/chroma

  ingestion:
    build: ./ingestion
    environment:
      OLLAMA_URL: http://host.docker.internal:11434
      CHROMA_HOST: chroma
      CHROMA_PORT: 8000
    extra_hosts:
      - host.docker.internal:host-gateway
    depends_on:
      - chroma
    ports:
      - "8001:8000"

  chat:
    build: ./chat
    environment:
      OLLAMA_URL: http://host.docker.internal:11434
      CHROMA_HOST: chroma
      CHROMA_PORT: 8000
    extra_hosts:
      - host.docker.internal:host-gateway
    depends_on:
      - chroma
    ports:
      - "8002:8000"

  ui:
    build: ./ui
    environment:
      INGESTION_URL: http://ingestion:8000
      CHAT_URL: http://chat:8000
    depends_on:
      - ingestion
      - chat
    ports:
      - "8501:8501"
