services:
  chroma:
    image: chromadb/chroma:0.5.23
    restart: unless-stopped
    environment:
      ANONYMIZED_TELEMETRY: "False"
    volumes:
      - ./chroma_data:/chroma/chroma

  ingestion:
    build: ./ingestion
    environment:
      OLLAMA_URL: http://host.docker.internal:11434
      CHROMA_HOST: chroma
      CHROMA_PORT: 8000
    extra_hosts:
      - host.docker.internal:host-gateway
    depends_on:
      - chroma
    ports:
      - "8001:8000"
    volumes:
      - ./seen_hashes:/app/seen_hashes
      - ./uploads:/app/uploads
      - ./documents:/app/documents

  chat:
    build: ./chat
    environment:
      OLLAMA_URL: http://host.docker.internal:11434
      CHROMA_HOST: chroma
      CHROMA_PORT: 8000
    extra_hosts:
      - host.docker.internal:host-gateway
    depends_on:
      - chroma
    ports:
      - "8002:8000"
    volumes:
      - ./chat_histories:/app/chat_histories

  ui:
    build: ./ui
    depends_on:
      - ingestion
      - chat
    ports:
      - "8501:8501"
